<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicholas Franklin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #15110c;
    --fg: #f5e6d3;
    --dim: #9c8769;
    --accent: #ff9f43;
    --accent-2: #7fd1d9;
    --cursor: #ff9f43;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse at top left, rgba(255,159,67,0.06), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(127,209,217,0.05), transparent 60%);
  }

  .terminal {
    width: 100%;
    max-width: 720px;
    max-height: 85vh;
    background: #1b1612;
    border: 1px solid #2e2620;
    border-radius: 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .titlebar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px 14px;
    background: var(--dim);
    flex-shrink: 0;
  }
  .titlebar-label {
    color: var(--bg);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .body {
    padding: 26px 28px 32px;
    font-size: 0.98rem;
    flex: 1;
    overflow-y: auto;
  }
  .body::-webkit-scrollbar { width: 6px; }
  .body::-webkit-scrollbar-track { background: transparent; }
  .body::-webkit-scrollbar-thumb { background: #3a3128; border-radius: 0; }

  .line { margin: 0 0 10px; white-space: pre-wrap; word-break: break-word; }
  .prompt { color: var(--dim); }
  .prompt .user { color: var(--accent); }
  .prompt .path { color: var(--accent-2); }
  .out { color: var(--fg); }
  .dimtext { color: var(--dim); }
  .accent { color: var(--accent); font-weight: 700; }

  .ascii {
    color: var(--accent);
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: 2px;
    margin: 4px 0 4px;
    white-space: pre;
    overflow-x: auto;
  }
  .ascii-sub {
    color: var(--dim);
    font-size: 0.8rem;
    letter-spacing: 4px;
    margin: 0 0 18px;
  }

  a { color: var(--accent-2); text-decoration: none; border-bottom: 1px dotted rgba(127,209,217,0.4); }
  a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 4px; }
  .tag {
    border: 1px solid #3a3128;
    color: var(--fg);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.78rem;
  }

  .cursor {
    display: inline-block;
    width: 9px;
    height: 1.05em;
    background: var(--cursor);
    margin-left: 2px;
    vertical-align: -2px;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  @media (max-width: 480px) {
    .body { padding: 18px 16px 26px; font-size: 0.88rem; }
    .ascii { font-size: 0.85rem; letter-spacing: 1px; }
  }
</style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <span class="titlebar-label">guest@nfranklin: ~</span>
    </div>
    <div class="body" id="term-body"></div>
  </div>

<script>
(function () {
  const body = document.getElementById('term-body');

  const PROMPT = '<span class="prompt"><span class="user">guest@nfranklin</span>:<span class="path">~</span>$ </span>';

  const steps = [
    {
      kind: 'instant',
      html: '<div class="line dimtext">Last login: Sat Jun 21 13:42:17 from 192.168.1.1 on pts/0</div>' +
            '<div class="ascii">##    ##  ########\n###   ##  ##\n####  ##  ######\n## ## ##  ##\n##  ####  ##\n##   ###  ##\n##    ##  ##</div>' +
            '<div class="ascii-sub">nicholas c. franklin</div>'
    },
    {
      kind: 'cmd',
      cmd: 'whoami',
      html: '<div class="line out">Nicholas C. Franklin</div>' +
            '<div class="line out">Director of Cybersecurity for Operational Technology (OT) &amp; Tactical Systems @ <a href="https://www.leidos.com/" target="_blank" rel="noopener">Leidos</a></div>'
    },
    {
      kind: 'cmd',
      cmd: 'cat status.txt',
      html: '<div class="line out">&gt; Focus: OT / ICS / Tactical Systems cybersecurity\n&gt; Availability: not accepting consideration for other positions at this time</div>'
    },
    {
      kind: 'cmd',
      cmd: 'cat skills.txt',
      html: '<div class="line"><div class="tags">' +
            '<span class="tag">OT / ICS Security</span>' +
            '<span class="tag">Critical Infrastructure</span>' +
            '<span class="tag">Threat Emulation</span>' +
            '<span class="tag">Team Leadership</span>' +
            '<span class="tag">Research and Development</span>' +
            '<span class="tag">Cyber Strategy</span>' +
            '<span class="tag">Upskilling Cyber Professionals</span>' +
            '</div></div>'
    },
    {
      kind: 'cmd',
      cmd: 'cat contact.txt',
      html: '<div class="line out">' +
            'email   :: <a href="mailto:nicholascfranklin@gmail.com">nicholascfranklin@gmail.com</a>\n' +
            'linkedin:: <a href="https://www.linkedin.com/in/nicholas-franklin-bab45375/" target="_blank" rel="noopener">linkedin.com/in/nicholas-franklin</a>\n' +
            'github  :: <a href="https://github.com/nicholie256" target="_blank" rel="noopener">github.com/nicholie256</a>' +
            '</div>'
    }
  ];

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function scrollBottom() {
    body.scrollTop = body.scrollHeight;
  }

  function appendHTML(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    while (tmp.firstChild) body.appendChild(tmp.firstChild);
    scrollBottom();
  }

  async function typeCmd(cmd) {
    const line = document.createElement('div');
    line.className = 'line';
    line.innerHTML = PROMPT;
    const text = document.createElement('span');
    const cur = document.createElement('span');
    cur.className = 'cursor';
    line.appendChild(text);
    line.appendChild(cur);
    body.appendChild(line);

    for (const ch of cmd) {
      text.textContent += ch;
      scrollBottom();
      await sleep(30 + Math.random() * 60);
    }

    cur.remove();
  }

  async function run() {
    for (const step of steps) {
      if (step.kind === 'instant') {
        appendHTML(step.html);
        await sleep(350);
      } else {
        await sleep(500 + Math.random() * 400);
        await typeCmd(step.cmd);
        await sleep(80 + Math.random() * 120);
        appendHTML(step.html);
      }
    }

    const finalLine = document.createElement('div');
    finalLine.className = 'line';
    finalLine.innerHTML = PROMPT + '<span class="cursor"></span>';
    body.appendChild(finalLine);
    scrollBottom();
  }

  run();
})();
</script>
</body>
</html>
