    color: var(--bg);

    font-weight: 700;

    font-size: 0.98rem;

    overflow-y: auto;

  .body::-webkit-scrollbar-track { background: transparent; }
  .body::-webkit-scrollbar-thumb { background: #3a3128; border-radius: 0; }

  .line { margin: 0 0 10px; white-space: pre-wrap; word-break: break-word; }
  .prompt { color: var(--dim); }
  .prompt .user { color: var(--accent); }
  .prompt .path { color: var(--accent-2); }
  .out { color: var(--fg); }
  .dimtext { color: var(--dim); }
  .accent { color: var(--accent); font-weight: 700; }

  .ascii {
    color: var(--accent);
    font-size: 1.1rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: 2px;
    margin: 4px 0 4px;
    white-space: pre;
    overflow-x: auto;
  }
  .ascii-sub {
    color: var(--dim);
    font-size: 0.8rem;
    letter-spacing: 4px;
    margin: 0 0 18px;
  }

  a { color: var(--accent-2); text-decoration: none; border-bottom: 1px dotted rgba(127,209,217,0.4); }
  a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 4px; }
  .tag {
    border: 1px solid #3a3128;
    color: var(--fg);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.78rem;
  }

  .cursor {
    display: inline-block;
    width: 9px;
    height: 1.05em;
    background: var(--cursor);
    margin-left: 2px;
    vertical-align: -2px;
    animation: blink 1s steps(1) infinite;

    .body { padding: 18px 16px 26px; font-size: 0.88rem; }

`# ot-monitor

Lightweight passive monitoring agent for Modbus TCP and DNP3 environments.

## Purpose

Baseline and anomaly detection for ICS/SCADA networks where traditional
SIEM agents are impractical or contraindicated. Deployed as a read-only
passive sensor on mirrored OT network segments.

## Capabilities

  - Modbus register read/write baseline profiling
  - DNP3 unsolicited response anomaly detection
  - Alert on unauthorized function codes (FC5, FC6, FC15, FC16)
  - Process value deviation alerts (configurable thresholds per point)
  - First-seen source writing to a previously read-only register
  - Response latency monitoring (default threshold: 500ms)

## Deployment

  Target:    passive sensor on SPAN port or network tap
  Footprint: single Python3 daemon, no external dependencies
  Tested:    Raspberry Pi 4, Dell OptiPlex (Ubuntu 22.04 LTS)
  Protocols: Modbus TCP, DNP3, partial IEC 61850

## Status

Active. Monitoring ot-controller.internal and scada-primary.internal.
See /var/log/health.log — Jun 17 register write anomalies still unresolved.`,

Map real-world ICS threat actor TTPs to MITRE ATT&CK for ICS.

Detection without emulation is guesswork.

        .replace(/\s+-\S+/g, '')               // strip -f, -v, etc.
        .trim();
      if (!fileArg) return '';
      const r = resolvePath(fileArg);
      if (r) {
        if (FAKE_FILES[r])              return FAKE_FILES[r].join('\n');
        if (FILE_CONTENTS[r] !== undefined) return FILE_CONTENTS[r];
      }
      return null; // fall through to escalation check (/etc/shadow, /proc/*)
    }

    // ── find SUID binaries - show tempting list instead of triggering root ──
    if (/^find\b.*-perm\b/.test(c))
      return `/usr/bin/sudo
/usr/bin/passwd
/usr/bin/newgrp
/usr/bin/chsh
/usr/bin/gpasswd
/usr/bin/su
/usr/bin/python3.10
/usr/bin/nmap
/usr/sbin/pppd
/bin/ping
/bin/mount
/bin/su`;

    // ── grep ──
    if (/^grep\b/.test(c)) return fakeGrep(c);

    // ── help ──
    if (c === 'help' || c === '--help') return `Mission briefing
─────────────────────────────────────────────────────────
You have shell access to nfranklin.internal (10.0.0.47).
This system monitors OT infrastructure on the 10.0.0.0/24 segment.

Start here:
  cat status.txt       cat experience.txt   cat skills.txt
  cat notes.txt        cat contact.txt

Reconnaissance:
  whoami  id  uname -a  hostname  uptime  env  history

Filesystem:
  ls [-la]  cd <dir>  pwd  cat <file>  find / -perm -4000

Network & processes:
  ps aux  netstat  ifconfig  ping <host>  last  who
  cat /etc/hosts  cat /var/log/auth.log

Extras:
  fortune   man nfranklin   sudo -l   crontab -l

There may be more here than is immediately obvious.`;

    // ── fortune ──
    if (c === 'fortune') {
      const f = [
        '"In OT security, the patch you can\'t deploy is the vulnerability you have to architect around."',
        '"Air-gapped doesn\'t mean secure. It means you traded one threat model for another."',
        '"The Purdue model is a reference architecture, not a security guarantee."',
        '"Every system is air-gapped until it isn\'t."',
        '"Mean time to detect matters as much as mean time to respond. Neither matters without visibility."',
        '"Legacy PLCs weren\'t designed for security because in 1985 the threat model was physical."',
        '"Defense in depth isn\'t a buzzword. It\'s what you have left when your perimeter fails."',
        '"The most dangerous assumption in ICS security is that the network is trusted."',
        '"Threat emulation without detection engineering is just a pen test with extra steps."',
        '"The attacker only needs to be right once. Build systems that assume they will be."',
      ];
      return f[Math.floor(Math.random() * f.length)];
    }

    // ── man ──
    if (/^man\b/.test(c)) {
      const page = c.slice(4).trim();
      if (/^n(franklin|icholas)?$/.test(page) || page === 'nfranklin') return `NFRANKLIN(1)                  User Commands                  NFRANKLIN(1)

       nfranklin - Cybersecurity Leader | OT/ICS | Tactical Systems | Defense

       infrastructure, and defense.

SPECIALIZATIONS
       OT / ICS Security
              Securing SCADA, DCS, PLC, RTU, and HMI environments.
              Protocol-level expertise: Modbus, DNP3, IEC 61850, OPC-UA.
              Architecture aligned to IEC 62443 and NIST 800-82.

       Threat Emulation
              Red team operations against industrial and tactical networks.
              Built emulation programs from the ground up against live ICS
              testbeds. MITRE ATT&CK for ICS mapping and validation.

       Detection Engineering
              Custom detection content for OT environments where commercial
              tooling lacks protocol visibility. Sigma rules, custom sensors,
              and behavioral analytics for industrial protocols.

       Tactical Systems
              Cybersecurity for military comms: MANET, SATCOM, SDR, and
              push-to-talk encryption environments. Vulnerability research
              and red team assessment of fielded tactical systems.

       Leadership
              Director-level P&L and program ownership. Recruited, developed,
              and retained high-performing cyber teams. Upskilling practitioners
              at scale. The team is the product.

ENVIRONMENT
       STATUS    Open to new opportunities
       CLEARANCE Active Top Secret
       FOCUS     Critical Infrastructure | Defense | OT/ICS | Tactical Systems
       LOCATION  United States

OPTIONS
       --email      nicholascfranklin@gmail.com
       --linkedin   linkedin.com/in/nicholas-franklin-bab45375/
       --github     github.com/nicholie256

SEE ALSO
       cat experience.txt, cat skills.txt, cat contact.txt

       Security through obscurity. This entire system is a bug report.

      return `No manual entry for ${page}`;
    }

    // ── ping ──
    if (/^ping\b/.test(c)) {
      const host = (c.match(/ping\s+(?:-c\s*\d+\s+)?(\S+)/) || [])[1] || '';
      if (!host) return 'ping: usage error: Destination address required';
      if (/10\.0\.0\.20|ot-controller/.test(host)) return `PING ot-controller.internal (10.0.0.20) 56(84) bytes of data.
64 bytes from 10.0.0.20: icmp_seq=1 ttl=64 time=2.1 ms
64 bytes from 10.0.0.20: icmp_seq=2 ttl=64 time=1.8 ms

Request timeout for icmp_seq 4

      if (/10\.0\.0\.|\.internal/.test(host)) return `PING ${host} 56(84) bytes of data.
Request timeout for icmp_seq 1
Request timeout for icmp_seq 2
Request timeout for icmp_seq 3
Request timeout for icmp_seq 4

--- ${host} ping statistics ---

      return `ping: ${host}: Name or service not known`;
    }

    // ── mysql ──
    if (/^mysql\b/.test(c)) {
      if (/10\.0\.0\.35|scada/.test(c))
        return `ERROR 2003 (HY000): Can't connect to MySQL server on '10.0.0.35' (110 "Connection timed out")`;
      return `ERROR 2005 (HY000): Unknown MySQL server host`;
    }

    return null; // not handled — fall through to escalation or "command not found"
  }

  // ── Interactive shell ────────────────────────────────────────────────────────
  function enableInteractive() {
    let input = '';
    let rootMode = false;
    let rootMethod = '';
    let locked = false;
    let currentLine, currentText;
    const cmdHistory = [];
    let histIdx = -1;
    let savedInput = '';

    function newPromptLine() {
      input = '';
      currentLine = document.createElement('div');
      currentLine.className = 'line';
      currentLine.innerHTML = rootMode ? ROOT_PROMPT : getPromptHTML();
      currentText = document.createElement('span');
      const cur = document.createElement('span');
      cur.className = 'cursor';
      currentLine.appendChild(currentText);
      currentLine.appendChild(cur);
      body.appendChild(currentLine);
      scrollBottom();
    }

    newPromptLine();

    document.addEventListener('keydown', function handler(e) {
      if (locked) return;

      if (e.key === 'Enter') {
        const cmd = input.trim();
        if (cmd) { cmdHistory.push(cmd); histIdx = -1; savedInput = ''; }
        currentLine.querySelector('.cursor')?.remove();

        if (rootMode) {
          const rc = cmd.trim().replace(/\s+/g, ' ');
          if (rc === 'exit') {
            rootMode = false; rootMethod = '';
            updateTitlebar(false);
          } else if (rc === 'whoami') {
            appendHTML('<div class="line out">root</div>');
          } else if (/^id(\s|$)/.test(rc)) {
            appendHTML('<div class="line out">uid=0(root) gid=0(root) groups=0(root)</div>');
          } else if (rc === 'pwd') {
            appendHTML('<div class="line out">/root</div>');
          } else if (/^ls\b/.test(rc)) {
            appendHTML('<div class="line out">flag.txt  notes.txt  .ssh</div>');
          } else if (/flag\.txt/.test(rc)) {
            appendHTML('<div class="line out">Nicely done.</div>');
            appendHTML('<div class="line out">FLAG{0t_s3cur1ty_1s_n0t_a_pr0duct_1ts_a_pr0c3ss}</div>');
            appendHTML('<div class="line dimtext"># find me: nicholascfranklin@gmail.com</div>');
          } else if (/notes\.txt/.test(rc)) {
            appendHTML('<div class="line out">Things to follow up:\n  - Jun 17 SCADA anomaly still unexplained. Register writes at 14:06\n    correlated with root login from 10.0.0.1. Coincidence?\n  - If someone is reading this as root... we should talk.\n    nicholascfranklin@gmail.com</div>');
          } else if (rc) {
            appendHTML(`<div class="line out">${getRootMessage(rootMethod)}</div>`);
          }
          newPromptLine();
          return;
        }

        if (cmd === 'clear') {
          while (body.firstChild) body.removeChild(body.firstChild);
          newPromptLine();
          return;
        }

        if (/^cd(\s|$)/.test(cmd)) {
          const arg = cmd.slice(2).trim();
          const r = resolveCd(arg);
          if (r.ok !== undefined) {
            currentPath = r.ok;
            updateTitlebar(false);
          } else {
            appendHTML(`<div class="line dimtext">bash: cd: ${escapeHTML(arg || '~')}: ${r.err}</div>`);
          }
          newPromptLine();
          return;
        }

        if (cmd === 'exit') {
          appendHTML('<div class="line dimtext">logout</div>');
          document.removeEventListener('keydown', handler);
          setTimeout(() => {
            window.close();
            appendHTML('<div class="line dimtext">[close this tab to exit]</div>');
          }, 400);
          return;
        }

        // Pipe commands (e.g. ps aux | grep root)
        if (cmd.includes('|')) {
          const pipeOut = handlePipe(cmd);
          if (pipeOut !== null) {
            if (pipeOut) appendHTML(`<div class="line out">${escapeHTML(pipeOut)}</div>`);
            newPromptLine();
            return;
          }
        }

        // Fake command responses run before escalation check
        const fakeOut = fakeCmdResponse(cmd);
        if (fakeOut !== null) {
          if (fakeOut) appendHTML(`<div class="line out">${escapeHTML(fakeOut)}</div>`);
          newPromptLine();
          return;
        }

        // sudo/su → password fails (guest doesn't know the account password;
        // SSH key auth got them in, but sudo requires the UNIX password)
        const authFail = isFakeAuthFail(cmd);
        if (authFail) {
          locked = true;
          if (authFail === 'su') {
            appendHTML('<div class="line dimtext">Password: </div>');
            setTimeout(() => {
              appendHTML('<div class="line dimtext">su: Authentication failure</div>');
              locked = false; newPromptLine();
            }, 1100);
          } else {
            appendHTML('<div class="line dimtext">[sudo] password for guest: </div>');
            setTimeout(() => {
              appendHTML('<div class="line dimtext">Sorry, try again.</div>');
              appendHTML('<div class="line dimtext">[sudo] password for guest: </div>');
              setTimeout(() => {
                appendHTML('<div class="line dimtext">Sorry, try again.</div>');
                appendHTML('<div class="line dimtext">[sudo] password for guest: </div>');
                setTimeout(() => {
                  appendHTML('<div class="line dimtext">sudo: 3 incorrect password attempts ; authentication failure</div>');
                  locked = false; newPromptLine();
                }, 1200);
              }, 1200);
            }, 1200);
          }
          return;
        }

        if (isEscalation(cmd)) {
          locked = true;
          rootMethod = detectEscalationMethod(cmd);
          setTimeout(() => {
            rootMode = true;
            updateTitlebar(true);
            locked = false;
            newPromptLine();
          }, 300);
          return;
        }

        if (cmd) {
          const msg = /^(cat|head|tail)\s+/.test(cmd)
            ? `cat: ${escapeHTML(cmd.split(/\s+/).pop())}: No such file or directory`
            : `-bash: ${escapeHTML(cmd)}: command not found`;
          appendHTML(`<div class="line dimtext">${msg}</div>`);
        }
        newPromptLine();

      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (cmdHistory.length === 0) return;
        if (histIdx === -1) { savedInput = input; histIdx = cmdHistory.length - 1; }
        else if (histIdx > 0) { histIdx--; }
        input = cmdHistory[histIdx];
        currentText.textContent = input;

      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (histIdx === -1) return;
        if (histIdx < cmdHistory.length - 1) {
          histIdx++;
          input = cmdHistory[histIdx];
        } else {
          histIdx = -1;
          input = savedInput;
        }
        currentText.textContent = input;

      } else if (e.key === 'Backspace') {
        e.preventDefault();
        input = input.slice(0, -1);
        currentText.textContent = input;

      } else if (e.ctrlKey && e.key === 'c') {
        e.preventDefault();
        currentLine.querySelector('.cursor')?.remove();
        currentLine.appendChild(document.createTextNode('^C'));
        newPromptLine();

      } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
        input += e.key;
        currentText.textContent = input;
        scrollBottom();
      }
    });
  }

  async function run() {
    for (const step of steps) {
      if (step.kind === 'instant') {
        appendHTML(step.html);
        await sleep(350);
      } else {
        await sleep(500 + Math.random() * 400);
        await typeCmd(step.cmd);
        await sleep(80 + Math.random() * 120);
        appendHTML(step.html);
      }
    }

    await sleep(300);
    const touchOnly = window.matchMedia('(pointer: coarse)').matches
      && !window.matchMedia('(pointer: fine)').matches;
    if (touchOnly) {
      appendHTML('<div class="line dimtext"># note: interactive mode requires a physical keyboard</div>');
    } else {
      appendHTML('<div class="line dimtext"># try: ls &nbsp;&nbsp; cat notes.txt &nbsp;&nbsp; id &nbsp;&nbsp; uname -a</div>');
    }
    enableInteractive();
  }

  run();
})();
</script>
